<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado Bitcoin sin secretos</title>
<style>
body {
  font-family: 'Open Sans', sans-serif;
  background: #f5f5f5;
  text-align: center;
  padding: 2rem;
}

.certificado {
  width: 800px;
  margin: auto;
  background: #fff;
  border: 8px solid #FFD700;
  border-radius: 18px;
  padding: 3rem;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.certificado h1 {
  font-size: 2rem;
  margin-bottom: 1rem;
  color: #333;
}

.certificado h2 {
  font-size: 1.5rem;
  margin: 1rem 0;
  color: #444;
}

.certificado p {
  font-size: 1.1rem;
  margin: 0.5rem 0;
}

.certificado .logo {
  font-weight: bold;
  color: #FFD700;
  margin-bottom: 1rem;
}

.btn {
  margin-top: 2rem;
  padding: 0.7rem 1.2rem;
  border: none;
  border-radius: 8px;
  background: #FFD700;
  color: #333;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s ease;
}
.btn:hover {
  transform: scale(1.05);
}
</style>
</head>
<body>

<div class="certificado" id="certificado">
  <div class="logo">Tecnológico de software</div>
  <h1>Certificado de Finalización</h1>
  <p>Se otorga a:</p>
  <h2 id="nombre-usuario">[Nombre del estudiante]</h2>
  <p>Por haber completado el curso <strong>Bitcoin sin secretos</strong></p>
  <p>Nivel alcanzado: <span id="nivel">Avanzado</span></p>
  <p>Fecha: <span id="fecha"></span></p>
  <p style="margin-top:2rem;">Hackathon Bitcoin México 2026</p>
</div>

<script>
  // Insertar nombre dinámicamente
  const nombre = prompt("Ingresa tu nombre para el certificado:");
  document.getElementById("nombre-usuario").textContent = nombre || "Estudiante";

  // Insertar fecha actual
  const hoy = new Date();
  const fechaFormateada = hoy.toLocaleDateString("es-MX",{year:"numeric",month:"long",day:"numeric"});
  document.getElementById("fecha").textContent = fechaFormateada;

  // Descargar automáticamente al cargar
  window.onload = () => {
    window.print();
  };
</script>

</body>
</html>
